name = "tera-api"
main = "src/worker.ts"
compatibility_date = "2025-01-01"
compatibility_flags = [ "nodejs_compat" ]

[vars]
NODE_ENV = "production"
# Note: Sensitive variables (MISTRAL_API_KEY, SUPABASE_URL, SUPABASE_ANON_KEY, SUPABASE_JWT_SECRET)
