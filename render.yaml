services:
  - type: web
    name: tera-web
    env: node
    region: oregon
    plan: starter
    buildCommand: pnpm install --no-frozen-lockfile && pnpm build
    startCommand: pnpm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: AUTH_SECRET
        sync: false
      - key: AUTH_URL
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: LEMON_SQUEEZY_API_KEY
        sync: false
      - key: LEMON_SQUEEZY_PLUS_VARIANT_ID
        sync: false
      - key: LEMON_SQUEEZY_PRO_VARIANT_ID
        sync: false
      - key: LEMON_SQUEEZY_WEBHOOK_SECRET
        sync: false
      - key: MISTRAL_API_KEY
        sync: false
      - key: NEXT_PUBLIC_APP_URL
        sync: false
      - key: NEXT_PUBLIC_LEMON_STORE_ID
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_ANON_KEY
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: NEXTAUTH_URL
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM_EMAIL
        sync: false
      - key: RESEND_REPLY_TO_EMAIL
        sync: false
      - key: SEARXNG_BASE_URL
        sync: false
      - key: SERPER_API_KEY
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: WEB_URL
        sync: false

  - type: web
    name: tera-api
    env: node
    region: oregon
    plan: starter
    buildCommand: pnpm install --no-frozen-lockfile && cd backend-server && pnpm build
    startCommand: cd backend-server && node dist/server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false
      - key: MISTRAL_API_KEY
        sync: false
      - key: SEARXNG_BASE_URL
        sync: false
      - key: SERPER_API_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM_EMAIL
        sync: false
      - key: RESEND_REPLY_TO_EMAIL
        sync: false
      - key: WEB_URL
        sync: false
