<!DOCTYPE html>
<html lang="en" class="grok-build">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>App — Grok Build</title>
  <link rel="stylesheet" href="/theme.css">
  <script>document.documentElement.setAttribute('data-theme',matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light');</script>
  <link rel="stylesheet" href="/toolbar.css">
  <link rel="stylesheet" href="/apps.css">
  <link rel="stylesheet" href="/app.css">
</head>
<body class="app-view-page">
  <div id="grok-toolbar-mount"></div>
  <div class="app-subtoolbar">
    <img id="app-icon" class="app-icon" width="28" height="28" alt="">
    <span class="app-title" id="app-title">App</span>
    <span class="app-path" id="app-path" title=""></span>
    <span class="app-status idle" id="app-status">Idle</span>
    <span class="spacer"></span>
    <button type="button" class="app-tool-btn refresh" id="refresh-preview" title="Refresh preview (re-render the live app)" aria-label="Refresh preview">↻</button>
    <div class="app-overflow" id="app-overflow">
      <button type="button" class="app-tool-btn" id="app-overflow-btn" aria-haspopup="true" aria-expanded="false" title="More actions" aria-label="More actions">⋯</button>
      <div class="app-overflow-menu" id="app-overflow-menu" role="menu" hidden>
        <a class="app-menu-item" id="open-app-tab" href="#" target="_blank" rel="noopener noreferrer" role="menuitem">Open in tab</a>
        <button type="button" class="app-menu-item" id="copy-cli" role="menuitem">Copy CLI command</button>
        <button type="button" class="app-menu-item" id="export-app" role="menuitem" hidden>Export as zip</button>
        <div class="app-menu-sep"></div>
        <button type="button" class="app-menu-item danger" id="delete-app" role="menuitem">Delete app</button>
      </div>
    </div>
    <a class="apps-btn ghost" id="back-gallery" href="/apps">Gallery</a>
  </div>
  <div class="app-workspace" id="app-workspace">
    <section class="app-preview" id="app-preview">
      <div class="app-preview-placeholder" id="preview-placeholder">Loading preview…</div>
    </section>
    <button type="button" class="chat-toggle" id="chat-toggle" title="Toggle chat sidebar" aria-expanded="true" aria-controls="app-chat">‹</button>
    <aside class="app-chat" id="app-chat">
      <div class="app-chat-messages" id="chat-messages"></div>
      <form class="app-chat-form" id="chat-form">
        <textarea id="chat-input" rows="2" placeholder="Ask Grok to edit this app…"></textarea>
        <button type="submit" id="chat-send">Send</button>
      </form>
    </aside>
  </div>
  <script src="/toolbar.js"></script>
  <script src="/common.js"></script>
  <script src="/app-view.js"></script>
</body>
</html>
