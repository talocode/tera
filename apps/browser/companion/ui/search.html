<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Tera Search — Tera Browser</title>
  <link rel="stylesheet" href="/theme.css">
  <script>document.documentElement.setAttribute('data-theme',matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light');</script>
  <link rel="stylesheet" href="/toolbar.css">
  <link rel="stylesheet" href="/search.css">
</head>
<body>
  <div id="nt-bg" class="nt-bg" aria-hidden="true"></div>
  <div id="nt-scrim" class="nt-scrim" aria-hidden="true"></div>
  <div id="tera-toolbar-mount"></div>
  <main class="main">
    <section id="hero" class="hero">
      <div class="search-brand" aria-hidden="true">
        <h1 class="tera-logo-hero" style="font-size: 48px; font-weight: 700; color: currentColor;">Tera</h1>
      </div>
      <nav id="search-modes" class="search-modes" aria-label="Search mode">
        <button type="button" class="search-mode active" data-mode="web">Web</button>
        <button type="button" class="search-mode" data-mode="learn">Learn</button>
      </nav>
      <form id="search-form" class="search-box">
        <input id="q" type="search" placeholder="Ask Tera or search the web..." autocomplete="off" autofocus>
        <button type="submit">Search</button>
      </form>
    </section>
  </main>
  <script src="/toolbar.js"></script>
  <script src="/common.js"></script>
  <script src="/search.js"></script>
  <script src="/newtab-bg.js"></script>
</body>
</html>
