<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>New Tab - Tera Browser</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #ffffff;
    }

    .container {
      text-align: center;
      padding: 40px;
      max-width: 600px;
      width: 100%;
    }

    .logo {
      font-size: 48px;
      font-weight: 700;
      margin-bottom: 8px;
      background: linear-gradient(90deg, #58C4DD, #83C167);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .tagline {
      font-size: 18px;
      color: #b0b0b0;
      margin-bottom: 40px;
    }

    .search-container {
      margin-bottom: 30px;
    }

    .search-box {
      display: flex;
      width: 100%;
      max-width: 500px;
      margin: 0 auto;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.2);
      transition: border-color 0.2s;
    }

    .search-box:focus-within {
      border-color: #58C4DD;
    }

    .search-input {
      flex: 1;
      padding: 16px 20px;
      font-size: 16px;
      background: transparent;
      border: none;
      color: #ffffff;
      outline: none;
    }

    .search-input::placeholder {
      color: #888888;
    }

    .search-button {
      padding: 16px 24px;
      background: linear-gradient(90deg, #58C4DD, #4a9fb8);
      border: none;
      color: #ffffff;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .search-button:hover {
      opacity: 0.9;
    }

    .actions {
      display: flex;
      gap: 16px;
      justify-content: center;
      margin-bottom: 40px;
    }

    .action-button {
      padding: 12px 24px;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 8px;
      color: #ffffff;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .action-button:hover {
      background: rgba(255, 255, 255, 0.2);
      border-color: #58C4DD;
    }

    .footer {
      color: #666666;
      font-size: 12px;
    }

    .footer a {
      color: #58C4DD;
      text-decoration: none;
    }

    .footer a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1 class="logo">Tera Browser</h1>
    <p class="tagline">Search, learn, summarize, and research with Tera.</p>

    <div class="search-container">
      <form id="searchForm" class="search-box">
        <input 
          type="text" 
          id="searchInput" 
          class="search-input" 
          placeholder="Ask Tera or search the web..."
          autofocus
        >
        <button type="submit" class="search-button">Ask Tera</button>
      </form>
    </div>

    <div class="actions">
      <button id="openTera" class="action-button">Open Tera</button>
    </div>

    <p class="footer">
      Powered by <a href="https://teraai.chat" target="_blank">Tera AI</a>
    </p>
  </div>

  <script>
    const TERA_SEARCH_URL = 'https://teraai.chat/?q=';
    const TERA_URL = 'https://teraai.chat';

    document.getElementById('searchForm').addEventListener('submit', (e) => {
      e.preventDefault();
      const query = document.getElementById('searchInput').value.trim();
      if (query) {
        window.location.href = TERA_SEARCH_URL + encodeURIComponent(query);
      }
    });

    document.getElementById('openTera').addEventListener('click', () => {
      window.location.href = TERA_URL;
    });
  </script>
</body>
</html>
