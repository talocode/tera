<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>New Tab - Tera Browser</title>
  <link rel="stylesheet" href="newtab.css">
</head>
<body>
  <div class="container">
    <h1 class="logo">Tera Browser</h1>
    <p class="tagline">A human-first AI browser for learning, research, and deep work.</p>

    <div class="search-container">
      <form id="searchForm" class="search-box">
        <input 
          type="text" 
          id="searchInput" 
          class="search-input" 
          placeholder="Ask Tera or search the web..."
          autofocus
        >
        <button type="submit" class="search-button">Ask Tera</button>
      </form>
    </div>

    <div class="actions">
      <button id="openTera" class="action-button">Open Tera</button>
    </div>

    <p class="footer">
      Powered by <a href="https://teraai.chat" target="_blank">Tera AI</a>
    </p>
  </div>

  <script src="newtab.js"></script>
</body>
</html>
